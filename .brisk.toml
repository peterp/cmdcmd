dependencies = []

[package]
name = "cmdcmd"
version = "0.1.1"

[app]
bundle_id = "com.p4p8.cmdcmd"
deployment_target = "14.0"
sources = "Sources/cmdcmd"
resources = ["Resources"]
asset_catalogs = []
frameworks = ["AppKit", "ScreenCaptureKit", "Carbon"]
linker_flags = []
swift_flags = []

[app.info]
CFBundleName = "⌘ ⌘"
CFBundleDisplayName = "⌘ ⌘"
CFBundleIconFile = "AppIcon"
NSHighResolutionCapable = true

[build]
architectures = ["arm64"]
platform = "macos"

[signing]
identity = "-"
hardened_runtime = false
notarize = false

[test]
sources = "Tests"
xctest = false

[archive]
zip = false
